<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>WeChat Reader AI</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <span class="logo">微信阅读助手</span>
      <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
    </header>

    <div id="article-bar" class="article-bar hidden">
      <div id="article-title" class="article-title"></div>
      <div id="article-meta" class="article-meta"></div>
    </div>

    <div id="state-no-article" class="state-panel">
      <div class="state-icon">📖</div>
      <p>打开一篇微信公众号文章<br>点击插件图标即可开始分析</p>
    </div>

    <div id="state-loading" class="state-panel hidden">
      <div class="spinner"></div>
      <p>正在分析文章…</p>
    </div>

    <div id="state-error" class="state-panel hidden">
      <div class="state-icon">⚠️</div>
      <p id="error-message"></p>
      <button id="btn-retry" class="btn-secondary">重试</button>
    </div>

    <div id="main-content" class="main-content hidden">
      <section class="section">
        <h3 class="section-title">Summary</h3>
        <div id="summary-text" class="section-body"></div>
      </section>

      <section class="section">
        <h3 class="section-title">Key Insights</h3>
        <div id="insights-text" class="section-body"></div>
      </section>

      <div class="save-row">
        <textarea id="my-notes" class="my-notes" placeholder="My notes…"></textarea>
        <button id="btn-save-note" class="btn-primary">Save Note</button>
      </div>
    </div>

    <div id="chat-section" class="chat-section hidden">
      <div class="chat-header">
        <span>Chat</span>
        <button id="btn-clear-chat" class="icon-btn small" title="Clear">↺</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" class="chat-input" type="text" placeholder="Ask about this article…">
        <button id="btn-send" class="btn-send">↑</button>
      </div>
    </div>

  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
